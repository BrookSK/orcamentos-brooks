<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Atualizar Preço SINAPI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
        }
        button {
            padding: 12px 24px;
            background: #C9973A;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        button:hover {
            background: #d4a44a;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }
    </style>
</head>
<body>
    <h1>🧪 Teste - Atualizar Preço SINAPI</h1>
    
    <div class="form-group">
        <label>Código SINAPI:</label>
        <input type="text" id="codigo" value="1379" placeholder="Ex: 1379">
    </div>
    
    <div class="form-group">
        <label>Novo Preço (R$):</label>
        <input type="number" id="preco" value="0.65" step="0.01" placeholder="Ex: 0.65">
    </div>
    
    <div class="form-group">
        <label>UF:</label>
        <input type="text" id="uf" value="SP" placeholder="SP">
    </div>
    
    <button onclick="testarAtualizacao()">🚀 Testar Atualização</button>
    
    <div id="resultado"></div>
    
    <script>
        async function testarAtualizacao() {
            const codigo = document.getElementById('codigo').value;
            const preco = parseFloat(document.getElementById('preco').value);
            const uf = document.getElementById('uf').value;
            const resultado = document.getElementById('resultado');
            
            resultado.textContent = '⏳ Enviando requisição...';
            resultado.className = '';
            
            console.log('📤 Enviando:', { codigo, preco, uf });
            
            try {
                const response = await fetch('/?api=sinapi-atualizar-preco', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ codigo, preco, uf })
                });
                
                console.log('📥 Status:', response.status, response.statusText);
                
                const data = await response.json();
                console.log('📊 Resposta:', data);
                
                if (data.success) {
                    resultado.textContent = '✅ SUCESSO!\n\n' + JSON.stringify(data, null, 2);
                    resultado.className = 'success';
                } else {
                    resultado.textContent = '❌ ERRO!\n\n' + JSON.stringify(data, null, 2);
                    resultado.className = 'error';
                }
            } catch (error) {
                console.error('❌ Erro:', error);
                resultado.textContent = '❌ ERRO DE COMUNICAÇÃO!\n\n' + error.message;
                resultado.className = 'error';
            }
        }
    </script>
</body>
</html>
